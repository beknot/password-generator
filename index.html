<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hash Combiner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f14;
    --surface:   #151820;
    --border:    #252a36;
    --accent:    #7c6af7;
    --accent2:   #4af0c8;
    --text:      #e4e6f0;
    --muted:     #5a607a;
    --error:     #f76a6a;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Inter', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2.5rem 2rem;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 0 60px rgba(124,106,247,0.07);
  }

  .header {
    margin-bottom: 2rem;
    text-align: center;
  }

  .header h1 {
    font-family: var(--mono);
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .header p {
    margin-top: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .fields {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 1.4rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  label {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  input[type="text"],
  input[type="password"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 0.65rem 0.9rem;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
    width: 100%;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.4rem 0 1.4rem;
  }

  .output-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }

  .output-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .hash-display {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    font-family: var(--mono);
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--accent2);
    min-height: 2.8rem;
    display: flex;
    align-items: center;
    transition: color 0.2s;
  }

  .hash-display.empty {
    color: var(--border);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    font-weight: 400;
  }

  .copy-btn {
    background: var(--border);
    border: none;
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.65rem 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .copy-btn:hover { background: var(--accent); color: #fff; }
  .copy-btn.copied { background: var(--accent2); color: var(--bg); }

  .info {
    margin-top: 1.2rem;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  .info code {
    font-family: var(--mono);
    background: var(--border);
    padding: 0.1em 0.35em;
    border-radius: 3px;
    font-size: 0.68rem;
    color: var(--accent2);
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>Hash Combiner</h1>
    <p>Combines three strings into an 8-character hash</p>
  </div>

  <div class="fields">
    <div class="field">
      <label for="s1">String 1</label>
      <input type="text" id="s1" placeholder="Enter first string…" autocomplete="off" spellcheck="false" />
    </div>
    <div class="field">
      <label for="s2">String 2</label>
      <input type="text" id="s2" placeholder="Enter second string…" autocomplete="off" spellcheck="false" />
    </div>
    <div class="field">
      <label for="s3">String 3</label>
      <input type="text" id="s3" placeholder="Enter third string…" autocomplete="off" spellcheck="false" />
    </div>
  </div>

  <hr class="divider" />

  <div class="output-label">Combined Hash</div>
  <div class="output-row">
    <div class="hash-display empty" id="hashOut">——————————</div>
    <button class="copy-btn" id="copyBtn" title="Copy to clipboard">Copy</button>
  </div>

  <p class="info">
    Charset: <code>0-9 a-z A-Z !@#&()</code> · Length: <code>8 chars</code>
  </p>
</div>

<script>
  const CHARSET = '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ!@#&()';
  const OUT_LEN  = 8;

  // MurmurHash3-inspired 32-bit integer hash (fmix32 finalizer chain)
  function hash32(str, seed = 0) {
    let h = seed >>> 0;
    for (let i = 0; i < str.length; i++) {
      let c = str.charCodeAt(i);
      h = Math.imul(h ^ c, 0x9e3779b9 | 0);
      h = ((h << 13) | (h >>> 19)) ^ (h >>> 7);
    }
    // fmix32 finalizer
    h ^= h >>> 16;
    h  = Math.imul(h, 0x85ebca6b | 0);
    h ^= h >>> 13;
    h  = Math.imul(h, 0xc2b2ae35 | 0);
    h ^= h >>> 16;
    return h >>> 0;
  }

  function combineHash(a, b, c) {
    // Three independent seeds ensure different strings affect different positions
    const h1 = hash32(a, 0x1a2b3c4d);
    const h2 = hash32(b, 0x5e6f7081);
    const h3 = hash32(c, 0x9a0b1c2d);

    // Mix all three together
    const mixed = [
      hash32(a + '\0' + b, h3),
      hash32(b + '\0' + c, h1),
      hash32(c + '\0' + a, h2),
      hash32(a + b + c,    h1 ^ h2 ^ h3),
      hash32(c + b + a,    h2 ^ h3),
      hash32(b + a + c,    h1 ^ h3),
      hash32(a + c,        h2),
      hash32(b + c + a,    h1),
    ];

    // Map each 32-bit hash to a character index
    return mixed.slice(0, OUT_LEN)
      .map(v => CHARSET[v % CHARSET.length])
      .join('');
  }

  const s1 = document.getElementById('s1');
  const s2 = document.getElementById('s2');
  const s3 = document.getElementById('s3');
  const out = document.getElementById('hashOut');
  const copyBtn = document.getElementById('copyBtn');

  function update() {
    const a = s1.value, b = s2.value, c = s3.value;
    if (!a && !b && !c) {
      out.textContent = '——————————';
      out.classList.add('empty');
      return;
    }
    out.classList.remove('empty');
    out.textContent = combineHash(a, b, c);
  }

  [s1, s2, s3].forEach(el => el.addEventListener('input', update));

  copyBtn.addEventListener('click', () => {
    const hash = out.textContent;
    if (!hash || out.classList.contains('empty')) return;
    navigator.clipboard.writeText(hash).then(() => {
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = 'Copy';
        copyBtn.classList.remove('copied');
      }, 1500);
    });
  });
</script>

</body>
</html>
